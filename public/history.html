<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ride History</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
width:90%;
margin:30px auto;
}

h1{
text-align:center;
color:#1565C0;
margin-bottom:20px;
}

.ride-card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.ride-card h2{
color:#1565C0;
margin-bottom:10px;
}

.ride-card p{
margin:8px 0;
font-size:17px;
}

.btn{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
margin-right:10px;
}

.cancel{
background:#e53935;
color:white;
}

.delete{
background:#1565C0;
color:white;
}

.empty{
text-align:center;
font-size:22px;
margin-top:60px;
color:gray;
}

</style>

</head>

<body>

<header>

<div class="logo">🚖 UCab</div>

<nav>

    <div class="logo">
        🚕 <span>UCab</span>
    </div>

    <div class="nav-links">

        <a href="index.html">Home</a>

        <a href="bookride.html">Book Ride</a>

        <a href="history.html">History</a>

        <a href="profile.html">Profile</a>

        <a href="services.html">Services</a>

        <a href="about.html">About</a>

        <a href="contact.html">Contact</a>

        <a href="login.html">Login</a>

    </div>

</nav>

</header>

<div class="container">

<h1>Your Ride History</h1>

<div id="rides"></div>

<div style="text-align:center;">

<button class="btn delete" onclick="clearHistory()">

Clear History

</button>

</div>

</div>

<script>

let rides = JSON.parse(localStorage.getItem("rides")) || [];

let output = "";

if(rides.length==0){

output="<div class='empty'>No rides booked yet 🚖</div>";

}
else{

rides.forEach((ride,index)=>{

output += `

<div class="ride-card">

<h2>Ride ${index+1}</h2>

<p><b>Pickup:</b> ${ride.pickup}</p>

<p><b>Drop:</b> ${ride.drop}</p>

<p><b>Vehicle:</b> ${ride.vehicle}</p>

<p><b>Fare:</b> ₹${ride.fare}</p>

<p><b>Status:</b> ${ride.status}</p>

<p><b>Date:</b> ${ride.date}</p>

<button class="btn cancel" onclick="cancelRide(${index})">

Cancel Ride

</button>

</div>

`;

});

}

document.getElementById("rides").innerHTML=output;

function cancelRide(index){

rides[index].status="Cancelled";

localStorage.setItem("rides",JSON.stringify(rides));

location.reload();

}

function clearHistory(){

if(confirm("Are you sure you want to delete all ride history?")){

localStorage.removeItem("rides");

location.reload();

}

}

</script>

</body>
</html>
