<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ride Confirmation</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
    width:500px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    color:green;
    text-align:center;
    margin-bottom:20px;
}

.info{
    font-size:18px;
    margin:12px 0;
}

.driver{
    margin-top:20px;
    padding:15px;
    background:#f4f4f4;
    border-radius:10px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    background:#1565C0;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0D47A1;
}

</style>

</head>

<body>

<header>

<div class="logo">🚖 UCab</div>

</header>

<div class="container">

<h2>✅ Ride Booked Successfully</h2>

<div class="info"><b>Pickup:</b> <span id="pickup"></span></div>

<div class="info"><b>Drop:</b> <span id="drop"></span></div>

<div class="info"><b>Vehicle:</b> <span id="vehicle"></span></div>

<div class="info"><b>Fare:</b> ₹<span id="fare"></span></div>

<div class="info"><b>Status:</b> <span id="status"></span></div>

<div class="info"><b>Date:</b> <span id="date"></span></div>

<div class="driver">

<h3>Driver Details</h3>

<p><b>Name:</b> Rahul Kumar</p>

<p><b>Cab Number:</b> AP21 AB 4567</p>

<p><b>Mobile:</b> 9876543210</p>

<p><b>Rating:</b> ⭐ 4.9</p>

</div>

<button onclick="window.location='history.html'">
View Ride History
</button>

<button onclick="window.location='bookride.html'">
Book Another Ride
</button>

</div>

<script>

let rides = JSON.parse(localStorage.getItem("rides")) || [];

if(rides.length > 0){

let ride = rides[rides.length-1];

document.getElementById("pickup").innerHTML = ride.pickup;
document.getElementById("drop").innerHTML = ride.drop;
document.getElementById("vehicle").innerHTML = ride.vehicle;
document.getElementById("fare").innerHTML = ride.fare;
document.getElementById("status").innerHTML = ride.status;
document.getElementById("date").innerHTML = ride.date;

}

</script>

</body>
</html>
