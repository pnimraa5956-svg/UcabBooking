<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCab - Register</title>
<link rel="stylesheet" href="css/style.css">

<style>

.register-box{
width:420px;
margin:50px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.register-box h2{
text-align:center;
margin-bottom:20px;
color:#1565C0;
}

.register-box input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

.register-box button{
width:100%;
padding:14px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

.register-box button:hover{
background:#0D47A1;
}

.register-box p{
text-align:center;
margin-top:20px;
}

.register-box a{
text-decoration:none;
color:#1565C0;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<div class="logo">
🚖 UCab
</div>

<nav>

<a href="index.html">Home</a>
<a href="login.html">Login</a>

</nav>

</header>

<div class="register-box">

<h2>Create Account</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="text"
id="phone"
placeholder="Phone Number">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirm"
placeholder="Confirm Password">

<button onclick="register()">

Create Account

</button>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

<script>

function register(){

let name=document.getElementById("name").value.trim();

let phone=document.getElementById("phone").value.trim();

let email=document.getElementById("email").value.trim();

let password=document.getElementById("password").value;

let confirm=document.getElementById("confirm").value;

if(name==""||phone==""||email==""||password==""||confirm==""){

alert("Please fill all fields.");

return;

}

if(phone.length!=10){

alert("Phone number should contain 10 digits.");

return;

}

if(password!=confirm){

alert("Passwords do not match.");

return;

}

let user={

name:name,
phone:phone,
email:email,
password:password

};

localStorage.setItem("ucabUser",JSON.stringify(user));

alert("Registration Successful!");

window.location="login.html";

}

</script>

</body>
</html>
