<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UCab - Payment</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.container h2{
text-align:center;
color:#1565C0;
margin-bottom:20px;
}

.payment-option{
padding:15px;
margin:15px 0;
border:2px solid #ddd;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

.payment-option:hover{
border-color:#1565C0;
background:#f5faff;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

.success{
display:none;
margin-top:25px;
padding:20px;
background:#e8f5e9;
border-radius:10px;
text-align:center;
}

.star{
font-size:30px;
cursor:pointer;
color:gray;
}

.active{
color:gold;
}

</style>

</head>

<body>

<header>

<div class="logo">🚖 UCab</div>

<nav>

<a href="index.html">Home</a>
<a href="history.html">History</a>
<a href="profile.html">Profile</a>

</nav>

</header>

<div class="container">

<h2>Choose Payment Method</h2>

<label class="payment-option">
<input type="radio" name="pay" value="Cash">
 Cash on Ride
</label>

<label class="payment-option">
<input type="radio" name="pay" value="UPI">
 UPI Payment
</label>

<label class="payment-option">
<input type="radio" name="pay" value="Card">
 Credit / Debit Card
</label>

<button onclick="payNow()">

Pay Now

</button>

<div class="success" id="success">

<h2>✅ Payment Successful</h2>

<p>Thank you for choosing UCab.</p>

<h3>Rate Your Driver</h3>

<div>

<span class="star" onclick="rate(1)">★</span>
<span class="star" onclick="rate(2)">★</span>
<span class="star" onclick="rate(3)">★</span>
<span class="star" onclick="rate(4)">★</span>
<span class="star" onclick="rate(5)">★</span>

</div>

<br>

<button onclick="window.location='index.html'">

Back to Home

</button>

</div>

</div>

<script>

function payNow(){

let pay=document.querySelector("input[name='pay']:checked");

if(!pay){

alert("Please select a payment method.");

return;

}

document.getElementById("success").style.display="block";

}

function rate(stars){

let s=document.querySelectorAll(".star");

s.forEach(function(item,index){

if(index<stars)
item.classList.add("active");

else
item.classList.remove("active");

});

localStorage.setItem("rating",stars);

}

</script>

</body>
</html>
